<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>公開排單</title>
<style>
  :root{
    --bg:#F7FBF2;
    --panel:#ffffff;
    --border:#D7EDBF;
    --line:rgba(144,211,90,.22);
    --text:#445038;
    --muted:#718064;
    --green:#90D35A;
    --green2:#A8DF7A;
    --greenDark:#6FAF3E;
    --greenDeep:#4F8F2F;
    --greenSoft:#F1F9E8;
    --cream:#FFFDF4;
    --shadow:0 16px 38px rgba(87,132,45,.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:38px 18px 56px;
    background:
      radial-gradient(circle at top left, rgba(144,211,90,.25), transparent 34%),
      radial-gradient(circle at bottom right, rgba(168,223,122,.18), transparent 32%),
      linear-gradient(180deg, #FDFFF9 0%, var(--bg) 48%, #F4FAEE 100%);
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",Arial;
    font-size:17px;
    line-height:1.65;
  }
  .wrap{max-width:1040px;margin:0 auto;}
  .hero{
    position:relative;
    overflow:hidden;
    margin-bottom:18px;
    padding:24px 26px;
    border:1px solid rgba(144,211,90,.34);
    border-radius:26px;
    background:rgba(255,255,255,.86);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-52px;
    top:-58px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:rgba(144,211,90,.15);
    pointer-events:none;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
    padding:5px 12px;
    border-radius:999px;
    background:var(--greenSoft);
    border:1px solid rgba(144,211,90,.32);
    color:var(--greenDeep);
    font-size:13px;
    font-weight:950;
  }
  h1{
    margin:0;
    font-size:32px;
    line-height:1.25;
    letter-spacing:.4px;
    color:#3E4B34;
  }
  .sub{
    margin-top:10px;
    color:var(--muted);
    font-size:15px;
  }
  .stats{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:18px;
  }
  .stat{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:9px 14px;
    border-radius:16px;
    background:rgba(255,255,255,.92);
    border:1px solid var(--border);
    font-size:15px;
    font-weight:900;
    color:#536545;
    box-shadow:0 6px 16px rgba(87,132,45,.06);
  }
  .table-card{
    overflow:hidden;
    border:1px solid var(--border);
    border-radius:24px;
    background:rgba(255,255,255,.96);
    box-shadow:0 12px 30px rgba(87,132,45,.09);
  }
  .table-scroll{overflow-x:auto;}
  table{
    width:100%;
    min-width:900px;
    border-collapse:separate;
    border-spacing:0;
  }
  th,td{
    border-bottom:1px solid var(--line);
    text-align:left;
    vertical-align:middle;
  }
  th{
    padding:14px 16px;
    background:#F3FAEA;
    color:#6C7E5A;
    font-size:13px;
    font-weight:950;
    letter-spacing:.3px;
    white-space:nowrap;
  }
  td{
    padding:18px 16px;
    font-size:16px;
    color:#4E5C43;
  }
  tr:last-child td{border-bottom:none;}
  tbody tr{transition:background .15s ease;}
  tbody tr:hover{background:#F6FBEF;}
  .queue-no{width:72px;text-align:center;}
  .queue-no span{
    display:inline-flex;
    justify-content:center;
    min-width:44px;
    padding:4px 9px;
    border-radius:999px;
    background:var(--greenSoft);
    border:1px solid rgba(144,211,90,.32);
    color:var(--greenDeep);
    font-size:13px;
    font-weight:950;
  }
  .client-cell{
    width:150px;
    white-space:nowrap;
  }
  .avatar{
    width:34px;
    height:34px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
    border-radius:13px;
    background:linear-gradient(135deg, var(--green), var(--greenDark));
    color:#fff;
    font-size:16px;
    font-weight:950;
    box-shadow:0 7px 16px rgba(111,175,62,.22);
    vertical-align:middle;
  }
  .client-name{
    color:var(--greenDeep);
    font-size:20px;
    font-weight:950;
    letter-spacing:.4px;
    vertical-align:middle;
  }
  .item-cell{
    width:210px;
    color:#3F4E34;
    font-size:18px;
    font-weight:950;
  }
  .date-cell{
    width:112px;
    white-space:nowrap;
  }
  .date-cell span{
    display:inline-flex;
    align-items:center;
    padding:6px 11px;
    border-radius:999px;
    background:#EEF8DF;
    border:1px solid rgba(144,211,90,.36);
    color:#59743F;
    font-size:15px;
    font-weight:900;
  }
  .note-cell{
    min-width:220px;
    white-space:pre-wrap;
    word-break:break-word;
    color:#607056;
    font-size:15px;
    font-weight:700;
    line-height:1.65;
  }
  .status-cell{
    width:132px;
    white-space:nowrap;
  }
  .status-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    min-width:92px;
    padding:6px 11px;
    border-radius:999px;
    font-size:14px;
    font-weight:950;
    border:1px solid transparent;
  }
  .status-wait{
    background:#F1F6EA;
    border-color:#DDECCB;
    color:#6D7C60;
  }
  .status-progress{
    background:var(--green);
    border-color:rgba(111,175,62,.42);
    color:#fff;
    box-shadow:0 6px 14px rgba(144,211,90,.24);
  }
  .status-done{
    background:#E9F6DD;
    border-color:rgba(111,175,62,.34);
    color:var(--greenDeep);
  }
  .empty-cell{
    padding:46px 18px;
    text-align:center;
    color:var(--muted);
  }
  .empty-icon{font-size:34px;margin-bottom:8px;}
  .empty-title{font-size:20px;font-weight:950;color:#4F5F42;}
  .empty-text{margin-top:4px;font-size:15px;}
  .footer{
    margin-top:18px;
    color:#7C8B70;
    font-size:13px;
    text-align:right;
  }
  @media (max-width: 700px){
    body{padding:22px 12px 40px;font-size:16px;}
    .hero{padding:20px 18px;border-radius:22px;}
    h1{font-size:27px;}
    .sub{font-size:14px;}
    .table-card{border-radius:20px;}
    th{padding:12px 13px;font-size:12px;}
    td{padding:15px 13px;}
    .client-name{font-size:19px;}
    .item-cell{font-size:17px;}
  }
</style>

</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">💜 Commission Queue</div>
      <h1>委託進行狀況</h1>
      <div class="sub">。</div>
      <div class="stats">
        <div class="stat">目前排單：1 件</div>
        <div class="stat">預計排至：2026/7</div>
        <div class="stat">最後更新：2026-07-16 13:06:39</div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>順序</th>
              <th>委託人</th>
              <th>項目</th>
              <th>開工</th>
              <th>DDL</th>
              <th>備註</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody>
            
      <tr>
        <td class="queue-no"><span>#01</span></td>
        <td class="client-cell">
          <span class="avatar">淺</span>
          <span class="client-name">淺＊</span>
        </td>
        <td class="item-cell">半身組合頁</td>
        <td class="date-cell"><span>7/13</span></td>
        <td class="date-cell"><span>7/20</span></td>
        <td class="note-cell">—</td>
        <td class="status-cell"><span class="status-pill status-progress">🎨 進行中</span></td>
      </tr>
    
          </tbody>
        </table>
      </div>
    </section>

    <div class="footer">Generated by 品</div>
  </main>
</body>
</html>
